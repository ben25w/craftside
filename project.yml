name: CraftSide
options:
  bundleIdPrefix: com.ben
  deploymentTarget:
    macOS: "13.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.0"
    MACOSX_DEPLOYMENT_TARGET: "13.0"
targets:
  CraftSide:
    type: application
    platform: macOS
    sources:
      - path: CraftSide
        excludes:
          - Resources/**
    resources:
      - path: CraftSide/Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ben.CraftSide
        PRODUCT_NAME: CraftSide
        INFOPLIST_FILE: CraftSide/Resources/Info.plist
        CODE_SIGN_STYLE: Automatic
        ENABLE_HARDENED_RUNTIME: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        DEVELOPMENT_ASSET_PATHS: ""
    entitlements:
      path: CraftSide/CraftSide.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.network.client: true
  CraftSideTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - CraftSideTests
      - CraftSide/Models/JSONValue.swift
      - CraftSide/Models/CraftBlock.swift
      - CraftSide/Models/CraftTaskSummary.swift
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
schemes:
  CraftSide:
    build:
      targets:
        CraftSide: all
        CraftSideTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - CraftSideTests
